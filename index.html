<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonómetro</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #1a1a2e;
    --green: #00ff88;
    --yellow: #ffcc00;
    --orange: #ff6600;
    --red: #ff0033;
    --dim: #1e2a1e;
    --text: #88ffaa;
    --muted: #3a5a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    gap: 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,136,0.015) 2px,
      rgba(0,255,136,0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .container {
    width: min(480px, 95vw);
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
  }

  .header {
    text-align: center;
    border: 1px solid var(--border);
    padding: 16px 24px;
    background: var(--panel);
    position: relative;
  }

  .header::before, .header::after {
    content: '//';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 12px;
  }
  .header::before { left: 8px; }
  .header::after { right: 8px; }

  .title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,0.5);
  }

  .subtitle {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* Big dB display */
  .db-display {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .db-display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.4;
  }

  .db-value {
    font-family: 'Orbitron', monospace;
    font-size: 88px;
    font-weight: 900;
    line-height: 1;
    transition: color 0.15s;
    text-shadow: 0 0 40px currentColor;
  }

  .db-unit {
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 4px;
    margin-top: 4px;
  }

  .level-label {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    margin-top: 12px;
    height: 20px;
    transition: color 0.2s;
  }

  /* VU Meter bar */
  .vu-wrapper {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 16px 20px;
  }

  .vu-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-bottom: 10px;
  }

  .vu-bar-bg {
    height: 28px;
    background: #0a0f0a;
    border: 1px solid #111;
    position: relative;
    overflow: hidden;
  }

  .vu-bar-fill {
    height: 100%;
    width: 0%;
    transition: width 0.05s ease-out;
    position: relative;
  }

  .vu-segments {
    position: absolute;
    inset: 0;
    display: flex;
    gap: 2px;
    padding: 3px;
    pointer-events: none;
  }

  .vu-seg {
    flex: 1;
    border-radius: 1px;
    opacity: 0.15;
    transition: opacity 0.05s;
  }

  .vu-seg.active { opacity: 1; }

  .vu-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 9px;
    color: var(--muted);
  }

  /* History graph */
  .graph-wrapper {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 16px 20px;
  }

  .graph-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }

  canvas#histGraph {
    width: 100%;
    height: 70px;
    display: block;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .stat-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
  }

  .stat-lbl {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* Button */
  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    padding: 14px 0;
    width: 100%;
    border: 1px solid var(--green);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn:hover {
    background: rgba(0,255,136,0.08);
    box-shadow: 0 0 20px rgba(0,255,136,0.2);
  }

  .btn.active {
    background: rgba(255,0,51,0.08);
    border-color: var(--red);
    color: var(--red);
    animation: pulse-border 1.5s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 6px rgba(255,0,51,0.3); }
    50% { box-shadow: 0 0 20px rgba(255,0,51,0.6); }
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    padding: 0 2px;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: middle;
  }

  .status-dot.on {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="title">SONÓMETRO</div>
    <div class="subtitle">ANALIZADOR DE NIVEL SONORO</div>
  </div>

  <div class="db-display">
    <div class="db-value" id="dbValue">--</div>
    <div class="db-unit">dB SPL</div>
    <div class="level-label" id="levelLabel">· INACTIVO ·</div>
  </div>

  <div class="vu-wrapper">
    <div class="vu-label">NIVEL / VOLUMEN</div>
    <div class="vu-bar-bg">
      <div class="vu-segments" id="vuSegments"></div>
    </div>
    <div class="vu-ticks">
      <span>SILENCIO</span>
      <span>NORMAL</span>
      <span>ALTO</span>
      <span>PELIGRO</span>
    </div>
  </div>

  <div class="graph-wrapper">
    <div class="graph-label">
      <span>HISTÓRICO (60s)</span>
      <span id="graphRange">0–100 dB</span>
    </div>
    <canvas id="histGraph" width="800" height="140"></canvas>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="statMin">--</div>
      <div class="stat-lbl">MÍN dB</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statAvg">--</div>
      <div class="stat-lbl">MED dB</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statMax">--</div>
      <div class="stat-lbl">MÁX dB</div>
    </div>
  </div>

  <button class="btn" id="mainBtn" onclick="toggleMic()">[ ACTIVAR MICRÓFONO ]</button>

  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText">ESPERANDO PERMISO</span></span>
    <span id="sampleRate">--</span>
  </div>

</div>

<script>
const NUM_SEGS = 40;
const HIST_MAX = 300; // samples stored
let history = [];
let minDb = Infinity, maxDb = -Infinity, sumDb = 0, countDb = 0;

// Build VU segments
const vuContainer = document.getElementById('vuSegments');
for (let i = 0; i < NUM_SEGS; i++) {
  const s = document.createElement('div');
  s.className = 'vu-seg';
  // color by zone
  if (i < 22) s.style.background = '#00ff88';
  else if (i < 30) s.style.background = '#ffcc00';
  else if (i < 36) s.style.background = '#ff6600';
  else s.style.background = '#ff0033';
  vuContainer.appendChild(s);
}
const segments = vuContainer.querySelectorAll('.vu-seg');

let audioCtx, analyser, source, stream;
let running = false;
let animFrame;

function dbColor(db) {
  if (db < 45) return '#00ff88';
  if (db < 65) return '#aaff44';
  if (db < 80) return '#ffcc00';
  if (db < 90) return '#ff6600';
  return '#ff0033';
}

function levelText(db) {
  if (db < 30) return '· SILENCIO ·';
  if (db < 45) return '· TRANQUILO ·';
  if (db < 60) return '· CONVERSACIÓN ·';
  if (db < 75) return '· ANIMADO ·';
  if (db < 85) return '· RUIDOSO ·';
  if (db < 95) return '▲ MUY RUIDOSO ▲';
  return '⚠ PELIGROSO ⚠';
}

function updateVU(db) {
  // map 20–105 dB to 0–NUM_SEGS
  const pct = Math.min(1, Math.max(0, (db - 20) / 85));
  const lit = Math.round(pct * NUM_SEGS);
  segments.forEach((s, i) => s.classList.toggle('active', i < lit));
}

function drawGraph() {
  const canvas = document.getElementById('histGraph');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (history.length < 2) return;

  const slice = history.slice(-HIST_MAX);
  const lo = 20, hi = 105;

  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,136,0.06)';
  ctx.lineWidth = 1;
  [30,45,60,75,90].forEach(db => {
    const y = H - ((db - lo) / (hi - lo)) * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  });

  // Fill
  const step = W / (HIST_MAX - 1);
  ctx.beginPath();
  slice.forEach((v, i) => {
    const x = i * step;
    const y = H - ((v - lo) / (hi - lo)) * H;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo((slice.length - 1) * step, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,255,136,0.07)';
  ctx.fill();

  // Line
  ctx.beginPath();
  slice.forEach((v, i) => {
    const x = i * step;
    const y = H - ((v - lo) / (hi - lo)) * H;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = 'rgba(0,255,136,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function tick() {
  if (!running) return;
  const bufferLength = analyser.fftSize;
  const dataArray = new Float32Array(bufferLength);
  analyser.getFloatTimeDomainData(dataArray);

  // RMS
  let sum = 0;
  for (let i = 0; i < bufferLength; i++) sum += dataArray[i] * dataArray[i];
  const rms = Math.sqrt(sum / bufferLength);
  const db = rms > 0 ? Math.max(20, Math.min(105, 20 * Math.log10(rms) + 90)) : 20;

  // Display
  document.getElementById('dbValue').textContent = Math.round(db);
  document.getElementById('dbValue').style.color = dbColor(db);
  document.getElementById('levelLabel').textContent = levelText(db);
  document.getElementById('levelLabel').style.color = dbColor(db);

  updateVU(db);

  // History
  history.push(db);
  if (history.length > HIST_MAX) history.shift();
  drawGraph();

  // Stats
  if (db > 20) {
    minDb = Math.min(minDb, db);
    maxDb = Math.max(maxDb, db);
    sumDb += db; countDb++;
    document.getElementById('statMin').textContent = Math.round(minDb);
    document.getElementById('statAvg').textContent = Math.round(sumDb / countDb);
    document.getElementById('statMax').textContent = Math.round(maxDb);
    document.getElementById('statMax').style.color = dbColor(maxDb);
  }

  animFrame = requestAnimationFrame(tick);
}

async function toggleMic() {
  if (running) {
    stopMic();
  } else {
    startMic();
  }
}

async function startMic() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    running = true;
    document.getElementById('mainBtn').textContent = '[ DETENER ]';
    document.getElementById('mainBtn').classList.add('active');
    document.getElementById('statusDot').classList.add('on');
    document.getElementById('statusText').textContent = 'CAPTURANDO';
    document.getElementById('sampleRate').textContent = audioCtx.sampleRate + ' Hz';

    tick();
  } catch(e) {
    document.getElementById('statusText').textContent = 'PERMISO DENEGADO';
    console.error(e);
  }
}

function stopMic() {
  running = false;
  cancelAnimationFrame(animFrame);
  if (source) source.disconnect();
  if (audioCtx) audioCtx.close();
  if (stream) stream.getTracks().forEach(t => t.stop());

  document.getElementById('mainBtn').textContent = '[ ACTIVAR MICRÓFONO ]';
  document.getElementById('mainBtn').classList.remove('active');
  document.getElementById('statusDot').classList.remove('on');
  document.getElementById('statusText').textContent = 'INACTIVO';
  document.getElementById('dbValue').textContent = '--';
  document.getElementById('levelLabel').textContent = '· INACTIVO ·';
  document.getElementById('levelLabel').style.color = '';
  document.getElementById('dbValue').style.color = '';
  segments.forEach(s => s.classList.remove('active'));
}
</script>
</body>
</html>
